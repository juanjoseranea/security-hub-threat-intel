<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado del Sistema - Celery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body.light-theme {
            --bg-color: #ffffff;
            --card-bg: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent: #024da1;
            --border-color: #e2e8f0;
        }

        body.grayscale-theme {
            --bg-color: #cbd5e1;
            --card-bg: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --accent: #0f172a;
            --border-color: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; color: var(--accent); }

        .btn-back {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .btn-back:hover { color: var(--accent); }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        
        body.light-theme th { background: rgba(0, 0, 0, 0.03); }
        body.grayscale-theme th { background: rgba(0, 0, 0, 0.03); }

        .status-pill {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-success { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .status-error { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .date { color: var(--text-secondary); font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Estado del Sistema</h1>
            <a href="{% url 'home' %}" class="btn-back">← Volver al Inicio</a>
        </header>

        <table>
            <thead>
                <tr>
                    <th>Tarea ID</th>
                    <th>Estado</th>
                    <th>Finalización</th>
                    <th>Resultado</th>
                </tr>
            </thead>
            <tbody>
                {% for task in tasks %}
                <tr>
                    <td class="date">{{ task.task_id|truncatechars:15 }}</td>
                    <td>
                        <span class="status-pill {% if task.status == 'SUCCESS' %}status-success{% else %}status-error{% endif %}">
                            {{ task.status }}
                        </span>
                    </td>
                    <td class="date">{{ task.date_done }}</td>
                    <td style="font-size: 0.85rem;">{{ task.result|truncatechars:40 }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" style="text-align: center; color: var(--text-secondary); padding: 3rem;">No hay registros de tareas recientes.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script>
        function setTheme(theme) {
            const body = document.body;
            body.classList.remove('light-theme', 'grayscale-theme');
            if (theme !== 'dark') {
                body.classList.add(theme + '-theme');
            }
        }
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) setTheme(savedTheme);
    </script>
</body>
</html>
